name: voxtrade_core
description: 'VoxTrade, feature of Trade with ai'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  get: ^4.7.3
  get_storage: ^2.1.1
  dio: ^5.9.0
  flutter_svg: ^2.2.2
  signalr_netcore: ^1.4.3
  financial_chart: ^0.4.1
  localstorage: ^6.0.0
  fl_chart: ^1.2.0
  record: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/VoxTradeLogo.png
  min_sdk_android: 21
